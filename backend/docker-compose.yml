services:
  postgres:
    image: postgres:16-alpine
    container_name: fentri-postgres
    restart: always
    environment:
      POSTGRES_USER: fentri_user
      POSTGRES_PASSWORD: fentri_password
      POSTGRES_DB: fentri_mvp
    ports:
      - "5433:5432"
    volumes:
      - pgdata_fentri_v2:/var/lib/postgresql/data

volumes:
  pgdata_fentri_v2:
